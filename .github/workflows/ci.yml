name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ProjectTaskManagement.slnx

      - name: Build
        run: dotnet build ProjectTaskManagement.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ProjectTaskManagement.slnx --configuration Release --no-build --verbosity normal
